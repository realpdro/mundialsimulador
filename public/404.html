<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, follow">
<title>Página no encontrada · Simulador Mundial 2026</title>
<style>
  :root{--bg:#0a0f1c;--card:#151e30;--line:#26344f;--txt:#e8eefb;--muted:#8a99b8;--green:#22c55e;--green2:#16a34a;--accent:#38bdf8}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,#16233e,#0a0f1c 55%);color:var(--txt);font-family:system-ui,'Segoe UI',Roboto,Arial,sans-serif;display:grid;place-items:center;min-height:100vh;padding:24px;text-align:center;-webkit-font-smoothing:antialiased}
  .box{max-width:540px}
  .crest{width:60px;height:60px;border-radius:16px;display:grid;place-items:center;font-size:30px;margin:0 auto 20px;background:linear-gradient(135deg,var(--green),var(--accent))}
  .code{font-size:clamp(72px,16vw,110px);font-weight:800;letter-spacing:-.04em;line-height:1;background:linear-gradient(135deg,var(--green),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:24px;font-weight:800;margin:6px 0 10px}
  p{color:var(--muted);font-size:15px;margin-bottom:26px;line-height:1.5}
  .btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  a.btn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;padding:12px 18px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--txt);text-decoration:none;transition:.15s}
  a.btn:hover{background:#21304e}
  a.btn.primary{background:linear-gradient(135deg,var(--green2),var(--green));border-color:transparent;color:#04210f}
  .langs{margin-top:24px;font-size:12px;color:var(--muted)}
  .langs a{color:var(--accent);text-decoration:none;font-weight:700;margin:0 5px}
</style>
</head>
<body>
  <div class="box">
    <div class="crest">🏆</div>
    <div class="code">404</div>
    <h1 id="t">Esta página no existe</h1>
    <p id="d">Puede que el enlace esté roto o que la página se haya movido. Pero el Mundial sigue — vuelve al simulador.</p>
    <div class="btns">
      <a class="btn primary" id="home" href="/es/">⚽ Ir al simulador</a>
      <a class="btn" id="grp" href="/es/grupos/">Grupos</a>
      <a class="btn" id="cal" href="/es/calendario/">Calendario</a>
    </div>
    <div class="langs"><a href="/es/">Español</a> · <a href="/en/">English</a> · <a href="/pt/">Português</a></div>
  </div>
  <script>
    (function () {
      var p = location.pathname;
      var lang = p.indexOf('/en/') === 0 ? 'en' : p.indexOf('/pt/') === 0 ? 'pt' : 'es';
      var S = {
        es: { t: 'Esta página no existe', d: 'Puede que el enlace esté roto o que la página se haya movido. Pero el Mundial sigue — vuelve al simulador.', home: '⚽ Ir al simulador', grp: 'Grupos', cal: 'Calendario' },
        en: { t: 'This page does not exist', d: 'The link may be broken or the page may have moved. But the World Cup goes on — back to the simulator.', home: '⚽ Go to the simulator', grp: 'Groups', cal: 'Schedule' },
        pt: { t: 'Esta página não existe', d: 'O link pode estar quebrado ou a página foi movida. Mas a Copa continua — volte ao simulador.', home: '⚽ Ir ao simulador', grp: 'Grupos', cal: 'Calendário' }
      }[lang];
      document.documentElement.lang = lang;
      var set = function (id, txt, href) { var e = document.getElementById(id); if (!e) return; e.textContent = txt; if (href) e.href = href; };
      set('t', S.t); set('d', S.d);
      set('home', S.home, '/' + lang + '/');
      set('grp', S.grp, '/' + lang + '/grupos/');
      set('cal', S.cal, '/' + lang + '/calendario/');
    })();
  </script>
</body>
</html>
